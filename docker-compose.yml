services:
  relay-service:
    # Use the root Dockerfile
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-relay:latest
    container_name: agent-relay
    restart: unless-stopped

    # Environment variables configuration
    # 1. Load from .env file on host
    env_file:
      - .env
    # 2. Can override specific variables here if needed
    environment:
      - NODE_ENV=production

    volumes:
      # Mount data directory for persistence
      # Maps local ./apps/relay-service/data to /app/data inside container
      - ./apps/relay-service/data:/app/data

      # Mount .env file (optional, allows inspection or reload if app supports it)
      # Mounted as read-only to prevent accidental modification inside container
      - ./.env:/app/.env:ro

    # Network configuration (if needed for future services like Redis/DB)
    # networks:
    #   - agent-relay-net

# networks:
#   agent-relay-net:
#     driver: bridge
